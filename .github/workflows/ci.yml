name: CI

on:
  # Deliberately no pull_request trigger: forks and PRs must not consume CI minutes.
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements*.txt"
      - "templates/**"
      - "static/**"
      - "packaging/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
